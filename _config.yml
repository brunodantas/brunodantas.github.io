theme: minima
plugins:
- jekyll-feed
- jekyll-sitemap
- jekyll-seo-tag
- jekyll-redirect-from

# Site settings
title: brunodantas
author: Bruno Dantas
description: >- # this means to ignore newlines until "baseurl:"
  Software engineering and related things.
url: "https://brunodantas.github.io" # the base hostname & protocol for your site
baseurl: "" # the subpath of your site, e.g. /blog

# SEO settings
lang: en_US
timezone: America/Sao_Paulo # Change to your timezone
google_site_verification: googlec39f095078cc50f8 # Add your Google Search Console verification code

# Social media and Open Graph defaults
social:
  name: brunodantas
  links:
    - https://github.com/brunodantas
    - https://linkedin.com/in/brunodantasm

# Logo for SEO
logo: /assets/images/konario.jpg # Add a logo if you have one

# Site verification (add these when you get them)
webmaster_verifications:
  google: # Add Google Search Console verification
  bing: # Add Bing Webmaster verification

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:title/

# Minima theme settings
minima:
  skin: auto
  social_links:
    github: brunodantas
    linkedin: brunodantasm

# Custom navigation - only show these pages in header
header_pages:
  - blog.md
  - about.md

# Show excerpts on home page
show_excerpts: true

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      image: /assets/images/konario.jpg # fallback OG image when a post sets none
  - scope:
      path: ""
    values:
      layout: "default"

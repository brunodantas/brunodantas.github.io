name: Build check

# Catches broken builds, dead internal links, and malformed HTML before
# they reach the live site (GitHub Pages publishes master automatically).

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Proof HTML
        run: bundle exec htmlproofer ./_site --disable-external --allow-hash-href
